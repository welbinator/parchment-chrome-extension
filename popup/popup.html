<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parchment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2bcaaa;
      --primary-dark: #22a98d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #f5f9f8;
      color: #1a1a1a;
    }

    .header {
      background: var(--primary);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
    }

    .header .settings-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
    }
    .header .settings-btn:hover { color: #fff; background: rgba(0,0,0,0.1); }

    .body { padding: 16px; }

    .state { display: none; text-align: center; }
    .state.visible { display: block; }

    /* Idle */
    .state-idle .icon { font-size: 36px; margin-bottom: 10px; }
    .state-idle .mode-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary); margin-bottom: 6px; }
    .state-idle p { font-size: 13px; color: #666; margin-bottom: 16px; }

    /* Detecting */
    .state-detecting p { font-size: 13px; color: #666; margin-top: 10px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #d0ede8;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success */
    .state-success .icon { font-size: 36px; margin-bottom: 10px; }
    .state-success .saved-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .state-success .saved-collection {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .state-success .ai-badge {
      display: inline-block;
      padding: 2px 8px;
      background: #e8f8f4;
      border-radius: 999px;
      font-size: 11px;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }
    .state-success .open-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 7px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }
    .state-success .open-btn:hover { background: var(--primary-dark); }

    /* Error */
    .state-error .icon { font-size: 36px; margin-bottom: 10px; }
    .state-error p { font-size: 13px; color: #c0392b; }
    .state-error .setup-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 7px 16px;
      background: #2c2c2c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    /* Buttons */
    .save-btn {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s;
      margin-bottom: 8px;
    }
    .save-btn:hover { background: var(--primary-dark); }
    .save-btn:disabled { background: #ccc; cursor: not-allowed; }

    .save-btn.secondary {
      background: #fff;
      color: var(--primary-dark);
      border: 1.5px solid var(--primary);
    }
    .save-btn.secondary:hover { background: #e8f8f4; }

    .ai-note {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }

    .footer {
      padding: 8px 16px 12px;
      font-size: 11px;
      color: #bbb;
      text-align: center;
    }
    .footer a { color: #bbb; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📜 Parchment</h1>
    <button class="settings-btn" id="openSettings" title="Settings">⚙️</button>
  </div>

  <div class="body">

    <!-- Idle: recipe mode -->
    <div class="state state-idle" id="stateIdleRecipe">
      <div class="icon">🍽️</div>
      <div class="mode-label">Recipe</div>
      <p>Save this recipe to your Parchment account.</p>
      <button class="save-btn" id="saveBtnRecipe">Save Recipe</button>
    </div>

    <!-- Idle: YouTube mode -->
    <div class="state state-idle" id="stateIdleYouTube">
      <div class="icon">▶️</div>
      <div class="mode-label">YouTube Video</div>
      <p>Save this video's transcript and notes to Parchment.</p>
      <button class="save-btn" id="saveBtnYouTubeFull">Save with AI Summary</button>
      <button class="save-btn secondary" id="saveBtnYouTubeTranscript">Save Transcript Only</button>
      <p class="ai-note" id="aiNote"></p>
    </div>

    <!-- Idle: article/generic mode -->
    <div class="state state-idle" id="stateIdleArticle">
      <div class="icon">📄</div>
      <div class="mode-label">Article</div>
      <p>Save a summary of this page to Parchment.</p>
      <button class="save-btn" id="saveBtnArticle">Summarize &amp; Save</button>
      <button class="save-btn secondary" id="saveBtnArticleRaw">Save Without Summary</button>
      <p class="ai-note" id="aiNoteArticle"></p>
    </div>

    <!-- Detecting -->
    <div class="state state-detecting" id="stateDetecting">
      <div class="spinner"></div>
      <p id="detectingMsg">Working…</p>
    </div>

    <!-- Success -->
    <div class="state state-success" id="stateSuccess">
      <div class="icon">✅</div>
      <div class="saved-title" id="successTitle"></div>
      <div class="saved-collection" id="successCollection"></div>
      <div class="ai-badge" id="aiBadge" style="display:none">✨ AI summary included</div>
      <a class="open-btn" id="openBtn" href="https://theparchment.app" target="_blank">Open Parchment</a>
    </div>

    <!-- Error -->
    <div class="state state-error" id="stateError">
      <div class="icon">⚠️</div>
      <p id="errorMsg"></p>
      <button class="setup-btn" id="errorSetupBtn" style="display:none">Open Settings</button>
    </div>

  </div>

  <div class="footer">
    <a id="footerSettings">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
