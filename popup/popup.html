<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parchment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2bcaaa;
      --primary-dark: #22a98d;
      --primary-fg: #0a2e28;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      background: #f5f9f8;
      color: #1a1a1a;
    }

    .header {
      background: var(--primary);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header img {
      width: 24px;
      height: 24px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
    }

    .header .settings-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(10,46,40,0.6);
      font-size: 18px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
    }

    .header .settings-btn:hover { color: #fff; background: rgba(0,0,0,0.1); }

    .body { padding: 16px; }

    .status-idle,
    .status-detecting,
    .status-success,
    .status-error {
      display: none;
      text-align: center;
    }

    .status-idle.visible,
    .status-detecting.visible,
    .status-success.visible,
    .status-error.visible {
      display: block;
    }

    /* Idle */
    .status-idle .icon { font-size: 36px; margin-bottom: 10px; }
    .status-idle p { font-size: 13px; color: #666; margin-bottom: 16px; }

    /* Detecting */
    .status-detecting p { font-size: 13px; color: #666; margin-top: 10px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #d0ede8;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success */
    .status-success .icon { font-size: 36px; margin-bottom: 10px; }
    .status-success .recipe-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .status-success p { font-size: 12px; color: #666; }
    .status-success .open-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 7px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }
    .status-success .open-btn:hover { background: var(--primary-dark); }

    /* Error */
    .status-error .icon { font-size: 36px; margin-bottom: 10px; }
    .status-error p { font-size: 13px; color: #c0392b; }
    .status-error .setup-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 7px 16px;
      background: #2c2c2c;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    /* Save button */
    .save-btn {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      transition: background 0.15s;
    }
    .save-btn:hover { background: var(--primary-dark); }
    .save-btn:disabled { background: #ccc; cursor: not-allowed; }

    .source-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 8px;
      background: #ede9e3;
      border-radius: 999px;
      font-size: 11px;
      color: #888;
    }

    .footer {
      padding: 8px 16px 12px;
      font-size: 11px;
      color: #bbb;
      text-align: center;
    }
    .footer a { color: #bbb; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📜 Parchment</h1>
    <button class="settings-btn" id="openSettings" title="Settings">⚙️</button>
  </div>

  <div class="body">
    <!-- Idle: ready to save -->
    <div class="status-idle visible" id="stateIdle">
      <div class="icon">🍽️</div>
      <p>Click below to save this recipe to your Parchment account.</p>
      <button class="save-btn" id="saveBtn">Save Recipe</button>
    </div>

    <!-- Detecting -->
    <div class="status-detecting" id="stateDetecting">
      <div class="spinner"></div>
      <p id="detectingMsg">Detecting recipe…</p>
    </div>

    <!-- Success -->
    <div class="status-success" id="stateSuccess">
      <div class="icon">✅</div>
      <div class="recipe-name" id="successName"></div>
      <p>Saved to your <strong>Recipes</strong> collection.</p>
      <span class="source-badge" id="sourceBadge"></span><br />
      <a class="open-btn" href="https://theparchment.app" target="_blank">Open Parchment</a>
    </div>

    <!-- Error -->
    <div class="status-error" id="stateError">
      <div class="icon">⚠️</div>
      <p id="errorMsg"></p>
      <button class="setup-btn" id="errorSetupBtn" style="display:none">Open Settings</button>
    </div>
  </div>

  <div class="footer">
    <a id="footerSettings">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
